version: 1.0.0
homepage: https://github.com/kikuchy/platform_ocr
repository: https://github.com/kikuchy/platform_ocr

platforms:
  ios:
  macos:
  windows:

environment:
  sdk: ^3.6.0

# Add regular dependencies here.
dependencies:
  code_assets: ^1.2.1
  objective_c: ^9.4.1
  native_toolchain_c: ">=0.19.0 <0.20.0"
  ffi: ^2.2.0
  image: ^4.9.1
  hooks: ">=2.0.0 <2.1.0"

dev_dependencies:
  lints: ^6.0.0
  test: ^1.31.2
  ffigen: ^20.1.1
  native_assets_cli: ^0.18.0
  logging: ^1.3.0
